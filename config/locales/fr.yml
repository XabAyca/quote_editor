fr:
  date:
    formats:
      default: "%d/%m/%Y"
      short: "%d/%m/%Y"
      long: "%-d %B %Y"

  time:
    formats:
      default: "%d/%m/%Y %H:%M"
      short: "%d/%m %H:%M"
      long: "%-d %B %Y à %H:%M"

  number:
    currency:
      format:
        unit: "€"
        format: "%n %u"
        separator: ","
        delimiter: " "
        precision: 2

  shared:
    actions:
      cancel: "Annuler"

  helpers:
    submit:
      create: "✓"
      update: "✓"
