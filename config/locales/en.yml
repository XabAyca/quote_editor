en:
  date:
    formats:
      default: "%Y-%m-%d"
      short: "%b %-d"
      long: "%B %-d, %Y"

  time:
    formats:
      default: "%Y-%m-%d %H:%M"
      short: "%b %-d, %H:%M"
      long: "%B %-d, %Y at %H:%M"

  shared:
    actions:
      cancel: "Cancel"

  helpers:
    submit:
      create: "✓"
      update: "✓"
