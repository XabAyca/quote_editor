en:
  date:
    formats:
      default: "%Y-%m-%d"
      short: "%b %-d"
      long: "%B %-d, %Y"

  time:
    formats:
      default: "%Y-%m-%d %H:%M"
      short: "%b %-d, %H:%M"
      long: "%B %-d, %Y at %H:%M"

  number:
    currency:
      format:
        unit: "€"
        format: "%n %u"
        separator: "."
        delimiter: ","
        precision: 2

  shared:
    actions:
      cancel: "Cancel"

  helpers:
    submit:
      create: "✓"
      update: "✓"
